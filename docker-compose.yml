services:
  postgres:
    image: postgres:16-alpine
    container_name: server-monitor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-server_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-server_monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-server_monitor}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
